<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/supabase-config.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/practice-exam.js"></script>
<script>
  (async function () {
    try {
      const user = await window.cambphysAuth.requireAuth();
      if (!user) return;
      await window.cambphysExam.init();
    } catch (e) {
      console.error(e);
      document.getElementById("exam-stage").innerHTML =
        '<p>Could not start the exam: ' + (e.message || e) + '</p>';
    }
  })();
</script>
