---
layout: default
title: My Account
permalink: /account/
---

<style>
  .acct-wrap { max-width: 720px; margin: 3rem auto; padding: 2rem; }
  .acct-header { display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #ddd; padding-bottom: 1rem; margin-bottom: 1.5rem; }
  .acct-header h1 { margin: 0; }
  .logout-btn { padding: 0.5rem 1rem; background: #b00; color: white; border: 0;
    border-radius: 4px; cursor: pointer; }
  .logout-btn:hover { background: #800; }
  .progress-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  .progress-table th, .progress-table td {
    text-align: left; padding: 0.5rem; border-bottom: 1px solid #eee; }
  .empty-state { color: #666; font-style: italic; }
</style>

<div class="acct-wrap">
  <div class="acct-header">
    <h1>My Account</h1>
    <button class="logout-btn" id="logout-btn">Log Out</button>
  </div>

  <p>Signed in as <strong id="user-email">…</strong></p>

  <h2>My Progress</h2>
  <div id="progress-area">
    <p class="empty-state">Loading…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/supabase-config.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
  (async function () {
    const user = await window.cambphysAuth.requireAuth();
    if (!user) return;
    document.getElementById("user-email").textContent = user.email;

    const rows = await window.cambphysAuth.getAllProgress();
    const area = document.getElementById("progress-area");
    if (!rows.length) {
      area.innerHTML = '<p class="empty-state">No lessons started yet.</p>';
      return;
    }
    let html = '<table class="progress-table"><thead><tr>' +
      '<th>Lesson</th><th>Completed</th><th>Score</th><th>Last accessed</th>' +
      '</tr></thead><tbody>';
    for (const r of rows) {
      html += `<tr>
        <td>${r.lesson_id}</td>
        <td>${r.completed ? "✓" : ""}</td>
        <td>${r.score ?? ""}</td>
        <td>${new Date(r.last_accessed).toLocaleString()}</td>
      </tr>`;
    }
    html += "</tbody></table>";
    area.innerHTML = html;
  })();

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await window.cambphysAuth.signOut();
    window.location.href = "/login/";
  });
</script>
